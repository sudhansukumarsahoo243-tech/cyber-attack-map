<!DOCTYPE html>
<html>

<head>

<title>Live Cyber Attack Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<h2>Live Cyber Attack Map</h2>

<h3>Total Attack Detect:<span id="count">0</span></h3>

<div id="map" style="height:500px"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

fetch("/attacks")
.then(res => res.json())
.then(data => {

    data.data.slice(0,20).forEach(ip => {

        fetch("https://ipinfo.io/" + ip.ipAddress + "/json")
        .then(res => res.json())
        .then(loc => {

            if(!loc.loc) return;

            var coords = loc.loc.split(",")

            L.marker([coords[0],coords[1]])
            .addTo(map)
            .bindPopup("Attacker IP: " + ip.ipAddress)

        })

    })

    document.getElementById("count").innerText = data.data.length

})
